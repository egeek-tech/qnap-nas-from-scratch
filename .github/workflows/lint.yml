name: Lint
on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run lint
      # Validate wrangler.jsonc + asset bundling without deploying (no Cloudflare
      # auth needed). The real deploy runs on Cloudflare Workers Builds.
      - run: npm run build:check
