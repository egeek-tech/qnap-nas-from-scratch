name: Deploy site
# Deferred: manual trigger only. To enable auto-deploy, uncomment the `push` trigger
# and set the CLOUDFLARE_API_TOKEN secret.
on:
  workflow_dispatch:
  # push:
  #   branches: [master]
  #   paths: ['README.md', 'assets/**', 'web/**']

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      # secrets can't be referenced in a step-level `if:`; map to an env flag here.
      HAS_CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Deploy to Cloudflare Workers
        if: env.HAS_CF_TOKEN == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Note skipped Cloudflare deploy
        if: env.HAS_CF_TOKEN != 'true'
        run: echo "::warning::CLOUDFLARE_API_TOKEN not set — skipped Cloudflare Workers deploy (GitHub Pages still published)."
      - uses: actions/upload-pages-artifact@v3
        with: { path: dist }
      - id: deployment
        uses: actions/deploy-pages@v4
